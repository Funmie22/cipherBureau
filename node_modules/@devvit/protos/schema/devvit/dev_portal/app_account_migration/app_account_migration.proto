syntax = "proto3";

package devvit.dev_portal.app_account_migration;

option go_package = "github.snooguts.net/reddit/reddit-devplatform-monorepo/go-common/generated/protos/types/devvit/devportal/appaccountmigration";

// Request to convert an existing Reddit bot account into the app account for an existing Devvit app.
message ConvertBotAccountToAppAccountRequest {
  // The UUID of the Devvit app whose app account should be replaced.
  string app_id = 1;
  // The t2_ ID of the Reddit bot account that should become the app account. (i.e., t2_a1b2c3)
  string bot_account_id = 2;
  // The password of the Reddit bot account that should become the app account. (i.e., correct-horse-battery-staple)
  string bot_account_password = 3;
}

// Response returned after a bot account has successfully taken over a Devvit app.
message ConvertBotAccountToAppAccountResponse {
  // The UUID of the migrated Devvit app. (Same as what was passed in.)
  string app_id = 1;
  // The app slug before the migration. (i.e., old-app-slug)
  string previous_app_slug = 2;
  // The app slug after the migration. This should match the username of the bot account that was converted. (i.e., my-cool-bot)
  string new_app_slug = 3;
}
